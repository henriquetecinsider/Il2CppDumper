name: Build Il2CppDumper 2026

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    # Atualizado para a versão mais recente do Windows Runner em 2026
    runs-on: windows-latest 

    steps:
    - uses: actions/checkout@v4 # Atualizado para v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4 # Atualizado para v4
      with:
        dotnet-version: 8.0.x # Versão estável em 2026

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Upload Artifact
      # RESOLVE O ERRO: Atualizado de v3 para v4
      uses: actions/upload-artifact@v4 
      with:
        name: Il2CppDumper-Output
        path: |
          **/bin/Release/**/Il2CppDumper.exe
          **/bin/Release/**/config.json
