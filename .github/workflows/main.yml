name: Build Il2CppDumper 2026 Final

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Executable
      # O segredo está aqui: --self-contained true cria o EXE com a DLL embutida
      run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o ./publish_output

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Il2CppDumper-SingleExe
        path: ./publish_output/Il2CppDumper.exe
